name: CI
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          coverage: pcov
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create Docker network
        run: docker network create study-on-network

      - name: Build and start Docker containers
        run: |
          docker compose build
          docker compose up -d
          docker ps -a

      - name: Configure application environment
        run: |
          cat > .env.local << 'EOF'
          DATABASE_URL="pgsql://pguser:pguser@postgres:5432/study_on_billing"
          JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE="123456"
          EOF
          echo 'DATABASE_URL="pgsql://pguser:pguser@postgres:5432/study_on_billing"' >> .env.test.local
          echo 'JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem"' >> .env.test.local
          echo 'JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem"' >> .env.test.local
          echo 'JWT_PASSPHRASE="123456"' >> .env.test.local

      - name: Generate JWT keypair
        run: docker compose exec -T php bin/console lexik:jwt:generate-keypair --overwrite

      - name: Prepare test database
        run: |
          docker compose exec -T php bin/console doctrine:database:drop --force --env=test || true
          docker compose exec -T php bin/console doctrine:database:create --env=test
          docker compose exec -T php bin/console doctrine:migrations:migrate -n --env=test
          docker compose exec -T php bin/console doctrine:fixtures:load -n --env=test

      - name: Run PHPUnit
        run: docker compose exec -T php bin/phpunit
